spring.application.name=shoppingapi

## Application port
server.port=8082

## default connection pool
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

## PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/dev
spring.datasource.username=postgres
spring.datasource.password=123456

## Driver e Dialeto (opcionais em versoes recentes, mas recomendados)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

## Estrategia de criacao de tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

## Default Schema
spring.flyway.schemas=shopping
spring.jpa.hibernate.default_schema=shopping